<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Savourd'afrique - Menu</title>
    <link rel="stylesheet" href="client.css">
</head>
<body>

    <header>
        <img src="images/logo1.png" alt="Logo" class="logo">
        <!-- <h1>Savourd'afrique</h1> -->
        <div class="table-badge" id="table-display">Table ..</div>
    </header>
    <div class="category-filters">
      <button class="filter-btn active" data-cat="tous">Tous</button>
      <button class="filter-btn" data-cat="Plats">Plats</button>
      <button class="filter-btn" data-cat="Boissons">Boissons</button>
      <button class="filter-btn" data-cat="Desserts">Desserts</button>
    </div>
    <main id="menu-container" class="menu-section">
        </main>

    <div class="floating-cart" id="cart-bar">
        <div class="cart-summary" id="cart-text">0 article - 0.00 €</div>
        <button class="btn-checkout" id="btn-checkout">Commander</button>
    </div>

    <div id="modal-overlay" class="overlay">
        <div class="modal">
            <h3>Confirmer la commande ?</h3>
            <p id="modal-details">Table 5 • Total: 14.50 €</p>
            <div class="modal-btns">
                <button class="btn-cancel" id="btn-cancel">Annuler</button>
                <button class="btn-confirm" id="btn-confirm">Envoyer en cuisine</button>
            </div>
        </div>
    </div>

    <div id="options-overlay" class="overlay">
        <div class="modal">
            <h3 id="opt-title">Personnaliser</h3>
            <p>Choisissez votre accompagnement :</p>
            <div id="options-list" class="options-container"></div>
            <div class="modal-btns">
                <button class="btn-cancel" onclick="closeOptions()">Annuler</button>
                <button class="btn-confirm" id="btn-add-final">Ajouter au panier</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
    <script src="client.js"></script>
</body>
</html>
